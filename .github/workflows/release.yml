name: release

# Cut a release the phone (Obtainium) can install:
#   • push a tag:   git tag v0.7.0 && git push origin v0.7.0
#   • or run manually from the Actions tab and type the version (e.g. v0.7.0).
# Either way this builds the APK, names it from the version, and publishes a
# GitHub Release with the APK attached. Obtainium tracks that Releases page.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.7.0 (versionCode must increase)"
        required: true
        type: string

defaults:
  run:
    working-directory: android

jobs:
  # Gate: pure-Kotlin core must pass before we cut a release.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "gradle"
      - name: core unit tests
        run: ./gradlew :core:test --no-daemon

  apk:
    runs-on: ubuntu-latest
    needs: core
    permissions:
      contents: write   # needed to create the GitHub Release (and the tag on manual runs)
    env:
      # Job-level so step `if:` conditions can see it. (A step's own `env:` block is
      # NOT in scope for that same step's `if`, which would make the signed-release
      # path silently never run.)
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-35
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0
            ${{ env.ANDROID_HOME }}/platform-tools
          key: android-sdk-35-0-0-${{ runner.os }}

      - name: Install SDK packages
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      # Accept the version from either the pushed tag or the manual input, and
      # normalise it to a "v"-prefixed tag.
      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          [ -n "$TAG" ] || { echo "no version supplied"; exit 1; }
          case "$TAG" in v*) ;; *) TAG="v$TAG";; esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      # Derive the APK version from the tag so the installed app matches the GitHub
      # release Obtainium shows. v3.0.0 -> versionName 3.0.0, versionCode 30000
      # (major*10000 + minor*100 + patch). versionCode MUST increase every release
      # or Android/Obtainium treats the new APK as already-installed and won't upgrade.
      - name: Derive version
        id: version
        run: |
          SEMVER="${{ steps.tag.outputs.tag }}"
          SEMVER="${SEMVER#v}"                 # strip leading "v": v3.0.0 -> 3.0.0
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          PATCH=${PATCH%%[-+]*}                # drop any -rc1/+build suffix from patch
          CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          echo "name=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"   >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=$SEMVER versionCode=$CODE"

      # Decode the keystore from the KEYSTORE_BASE64 secret when present.
      # To set this up:
      #   1. base64 -w0 your.keystore > keystore.b64  (Linux) or
      #      base64 -i your.keystore | tr -d '\n' > keystore.b64  (macOS)
      #   2. Add the file contents as the KEYSTORE_BASE64 repository secret.
      #   3. Add KEYSTORE_STORE_PASSWORD, KEYSTORE_KEY_ALIAS, KEYSTORE_KEY_PASSWORD.
      - name: Decode keystore
        id: keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK (signed)
        if: ${{ steps.keystore.outputs.path != '' }}
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -PappVersionName="${{ steps.version.outputs.name }}" \
            -PappVersionCode="${{ steps.version.outputs.code }}" \
            -Pandroid.injected.signing.store.file="${{ steps.keystore.outputs.path }}" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # Fallback: no signing secrets configured → ship the debug APK.
      # Debug APKs are signed with the Android debug key and are
      # side-loadable on any device with "install from unknown sources" enabled.
      # NOTE: the debug build sets applicationId .debug — pick ONE track and stay on
      # it, because Android won't upgrade across a different applicationId.
      - name: Assemble debug APK (fallback)
        if: ${{ steps.keystore.outputs.path == '' }}
        run: |
          ./gradlew :app:assembleDebug --no-daemon \
            -PappVersionName="${{ steps.version.outputs.name }}" \
            -PappVersionCode="${{ steps.version.outputs.code }}"

      - name: Locate and rename APK
        id: apk
        run: |
          # Prefer the release APK; fall back to debug.
          APK=$(find app/build/outputs/apk -name "*.apk" \
                  \( -path "*/release/*" -o -path "*/debug/*" \) \
                  | sort | tail -1)
          [ -n "$APK" ] || { echo "no APK produced"; exit 1; }
          DEST="mcctl-android-${{ steps.tag.outputs.tag }}.apk"
          cp "$APK" "$DEST"
          echo "path=$(pwd)/$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "mcctl ${{ steps.tag.outputs.tag }}"
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
