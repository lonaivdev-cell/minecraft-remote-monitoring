name: release

# The release version is the single source of truth in src/mcctl/__init__.py (__version__),
# kept in lockstep with the Android APK. On every push to main this reads that version and —
# only if no matching GitHub Release/tag exists yet — runs the gate, builds the APK, and
# publishes a Release tagged v<version> with the APK attached (the artifact Obtainium installs).
# So bumping __version__ in a merged PR *is* the release; a merge that leaves it unchanged is a
# no-op. You can also run it by hand from the Actions tab (tick "force" to re-cut an existing
# version).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Re-cut the release even if v<version> already exists"
        type: boolean
        default: false

jobs:
  # Read the gospel version and decide whether this push needs a release.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}   # 1.1.1
      tag: ${{ steps.v.outputs.tag }}           # v1.1.1
      code: ${{ steps.v.outputs.code }}         # 10101
      release: ${{ steps.v.outputs.release }}   # "true" when there's a new version to ship
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need the tags to know what's already released

      - name: Resolve version from source
        id: v
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/mcctl/__init__.py)
          [ -n "$VERSION" ] || { echo "could not read __version__ from src/mcctl/__init__.py"; exit 1; }
          TAG="v$VERSION"
          # versionCode = major*10000 + minor*100 + patch. MUST increase every release or
          # Android/Obtainium treats the APK as already-installed and won't upgrade — the
          # semver bump guarantees it as long as the version only ever goes up.
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          PATCH=${PATCH%%[-+]*}                  # drop any -rc1/+build suffix from patch
          CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "code=$CODE"       >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$TAG already released — nothing to do (bump __version__ to cut a new one)."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::cutting release $TAG (versionName=$VERSION versionCode=$CODE)."
          fi

  # Gate: pure-Kotlin core must pass before we cut a release.
  core:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "gradle"
      - name: core unit tests
        run: ./gradlew :core:test --no-daemon

  apk:
    needs: [version, core]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release (and its tag)
    defaults:
      run:
        working-directory: android
    env:
      # Job-level so step `if:` conditions can see it. (A step's own `env:` block is
      # NOT in scope for that same step's `if`, which would make the signed-release
      # path silently never run.)
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-35
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0
            ${{ env.ANDROID_HOME }}/platform-tools
          key: android-sdk-35-0-0-${{ runner.os }}

      - name: Install SDK packages
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      # Decode the keystore from the KEYSTORE_BASE64 secret when present.
      # To set this up:
      #   1. base64 -w0 your.keystore > keystore.b64  (Linux) or
      #      base64 -i your.keystore | tr -d '\n' > keystore.b64  (macOS)
      #   2. Add the file contents as the KEYSTORE_BASE64 repository secret.
      #   3. Add KEYSTORE_STORE_PASSWORD, KEYSTORE_KEY_ALIAS, KEYSTORE_KEY_PASSWORD.
      - name: Decode keystore
        id: keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK (signed)
        if: ${{ steps.keystore.outputs.path != '' }}
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -PappVersionName="${{ needs.version.outputs.version }}" \
            -PappVersionCode="${{ needs.version.outputs.code }}" \
            -Pandroid.injected.signing.store.file="${{ steps.keystore.outputs.path }}" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # Fallback: no signing secrets configured → ship the debug APK.
      # Debug APKs are signed with the Android debug key and are side-loadable on any device
      # with "install from unknown sources" enabled.
      # NOTE: the debug build sets applicationId .debug — pick ONE track and stay on it,
      # because Android won't upgrade across a different applicationId.
      - name: Assemble debug APK (fallback)
        if: ${{ steps.keystore.outputs.path == '' }}
        run: |
          ./gradlew :app:assembleDebug --no-daemon \
            -PappVersionName="${{ needs.version.outputs.version }}" \
            -PappVersionCode="${{ needs.version.outputs.code }}"

      - name: Locate and rename APK
        id: apk
        run: |
          # Prefer the release APK; fall back to debug.
          APK=$(find app/build/outputs/apk -name "*.apk" \
                  \( -path "*/release/*" -o -path "*/debug/*" \) \
                  | sort | tail -1)
          [ -n "$APK" ] || { echo "no APK produced"; exit 1; }
          DEST="mcctl-android-${{ needs.version.outputs.tag }}.apk"
          cp "$APK" "$DEST"
          echo "path=$(pwd)/$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "mcctl ${{ needs.version.outputs.tag }}"
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
