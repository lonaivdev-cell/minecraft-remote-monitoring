name: android

on:
  push:
    branches: ["**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

defaults:
  run:
    working-directory: android

jobs:
  # The pure-Kotlin protocol layer (JSON-RPC client, models, Ed25519/OpenSSH). Needs no
  # Android SDK, so it runs fast and gates the rest.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: core unit tests
        run: ./gradlew :core:test --no-daemon

  # The Compose app. GitHub runners can reach Google's Maven (unlike the dev sandbox), so
  # the APK is built here and uploaded as an installable artifact.
  apk:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcctl-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
