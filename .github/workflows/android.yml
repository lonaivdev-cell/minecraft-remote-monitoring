name: android

on:
  push:
    branches: ["**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

defaults:
  run:
    working-directory: android

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "gradle"
      - name: core unit tests
        run: ./gradlew :core:test --no-daemon

  apk:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "gradle"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Android SDK packages
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-35
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0
            ${{ env.ANDROID_HOME }}/platform-tools
          key: android-sdk-35-0-0-${{ runner.os }}
      - name: Install SDK packages
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcctl-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
