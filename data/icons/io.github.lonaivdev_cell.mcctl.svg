<?xml version="1.0" encoding="UTF-8"?>
<!-- mcctl app icon: creeper face on a GNOME-green rounded square (8x8 grid, 14px cells). -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33d17a"/>
      <stop offset="1" stop-color="#26a269"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="22" fill="url(#g)"/>
  <g fill="#11472b">
    <!-- eyes -->
    <rect x="22" y="36" width="28" height="28"/>
    <rect x="78" y="36" width="28" height="28"/>
    <!-- mouth -->
    <rect x="50" y="64" width="28" height="42"/>
    <rect x="36" y="78" width="14" height="42"/>
    <rect x="78" y="78" width="14" height="42"/>
  </g>
  <!-- subtle top highlight -->
  <rect x="8" y="8" width="112" height="40" rx="22" fill="#ffffff" opacity="0.08"/>
</svg>
